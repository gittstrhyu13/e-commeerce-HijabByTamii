<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Berhasil</title>
    <style>
        /* Gaya dasar untuk memastikan konten di tengah */
        body { 
            font-family: sans-serif; 
            background: #fdfaf6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        /* Container untuk box pesan sukses */
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

        /* Ikon centang */
        .icon { 
            font-size: 60px; 
            color: #7fb069; 
            margin-bottom: 20px; 
        }

        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        /* Tombol kembali */
        .btn-home { 
            display: inline-block;
            background-color: #d4a373; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 5px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: background 0.3s;
        }

        .btn-home:hover { 
            background-color: #bc8a5f; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">✓</div>
        <h1>Pembayaran Berhasil!</h1>
        <p>Terima kasih atas pesanan Anda. Pesanan Anda sedang kami siapkan untuk dikirim.</p>
        <a href="index.html" class="btn-home">Kembali ke Beranda</a>
    </div>

</body>
</html>
