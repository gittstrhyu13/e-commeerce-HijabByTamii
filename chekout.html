<div style="padding: 20px; max-width: 600px; margin: auto;">
    <h2>Ringkasan Checkout</h2>
    <div style="border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
        <p>Produk: Nama Produk</p>
        <p>Harga: Rp 50.000</p>
        <hr>
        <p><strong>Total: Rp 50.000</strong></p>
    </div>

    <button class="btn-checkout" style="margin-top: 20px;">Konfirmasi Pembayaran</button>
</div>
