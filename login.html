<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; background: #fdfaf6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-login { background: #d4a373; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-login:hover { background: #bc8a5f; }
        h2 { color: #333; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form action="index.html" method="GET">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" class="btn-login">Masuk</button>
    </form>
    <p style="font-size: 12px; margin-top: 15px;">Belum punya akun? <a href="#">Daftar</a></p>
</div>

</body>
</html>
